  <!DOCTYPE html>
<html>
<head>
  <title>Place Order</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Place Your Order ✨</h2>

<div class="order-container">

  <!-- PRODUCT -->
  <div class="product-box">
    <img id="productImage">
    <h3 id="productName"></h3>
  </div>

  <!-- NOTE -->
  <p class="note">
    📏 Note: You can mention your measurements in the details section below.
  </p>

  <!-- FORM -->
  <input type="text" id="name" placeholder="Enter your name">
  <input type="text" id="phone" placeholder="Enter phone number">
  <textarea id="details" placeholder="Enter design & measurement details"></textarea>

  <button onclick="sendToWhatsApp()">Place Order</button>

  <!-- THANK YOU -->
  <p class="Thank-you">
    💖 Thank you for trusting us with your style! We’ll craft it perfectly for you.
  </p>

</div>

<!-- SCRIPT -->
<script>

window.onload = function() {
  let name = localStorage.getItem("productName");
  let image = localStorage.getItem("productImage");

  document.getElementById("productName").innerText = name;
  document.getElementById("productImage").src = image;
};

function sendToWhatsApp() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let details = document.getElementById("details").value;

  let product = localStorage.getItem("productName");

  let message =
    "Name: " + name +
    "%0APhone: " + phone +
    "%0AProduct: " + product +
    "%0ADetails: " + details;

  let url = "https://wa.me/917397311691?text=" + message;

  window.open(url, "_blank");
}

</script>

</body>
</html>
